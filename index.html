<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCE Restoration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --mc-green: #3C8527; --mc-border: #212121; }
        body { background: #121212; font-family: 'Inter', sans-serif; }
        .dirt-bg {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.minecraft.net/content/dam/archive/663e8a7c2936746f6312.png');
            background-repeat: repeat; background-size: 64px; image-rendering: pixelated;
        }
        .glass-panel {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .lce-btn {
            font-family: 'VT323', monospace;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 0 #1E4314;
        }
        .lce-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #1E4314; brightness: 1.1; }
        .lce-btn:active { transform: translateY(2px); box-shadow: 0 0px 0 #1E4314; }
    </style>
</head>
<body class="dirt-bg min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-panel rounded-2xl p-8 shadow-2xl text-center">
        <h1 class="text-3xl font-bold tracking-tight text-white mb-2 uppercase italic">LCE <span class="text-green-500">Restoration</span></h1>
        <p class="text-gray-400 text-sm mb-8">2014 Multiplayer Architecture & Source</p>

        <div class="inline-flex items-center space-x-2 bg-black/30 px-3 py-1 rounded-full mb-8 border border-white/5">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold text-green-400 tracking-widest uppercase">14 Lobbies Active</span>
        </div>

        <div class="space-y-4">
            <a href="https://github.com/YourUsername/YourRepo/archive/refs/heads/main.zip" 
               class="lce-btn block w-full bg-[#3C8527] text-white py-4 rounded-lg text-2xl no-underline">
                LATEST MULTIPLAYER SOURCE
            </a>
            
            <div class="flex justify-between items-center text-[10px] text-gray-500 font-mono px-2 uppercase tracking-tighter">
                <span>Verified: LCMP Protocol</span>
                <span>Pass: fuckanon</span>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-white/10">
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">Project Hub & Community Archive</p>
        </div>
    </div>

</body>
</html>
